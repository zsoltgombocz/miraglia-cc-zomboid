name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build frontend
      run: bun run build

    - name: Build Docker image
      run: docker build -t zomboid-landing:${{ github.sha }} .

    - name: Test Docker image
      run: |
        docker run -d --name test-container \
          -e ADMIN_PASSWORD=test \
          -e SERVER_IP=127.0.0.1 \
          -e SERVER_PORT=16261 \
          zomboid-landing:${{ github.sha }}

        sleep 5

        # Test health endpoint
        docker exec test-container bun -e "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) throw new Error('Health check failed'); })"

        # Cleanup
        docker stop test-container
        docker rm test-container

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.actor }}/zomboid-landing-cc
        tags: |
          type=raw,value=latest
          type=sha,

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
