services:
  app:
    image: ghcr.io/zsoltgombocz/zomboid-landing-cc:latest
    container_name: zomboid-landing
    restart: unless-stopped

    volumes:
      # Expose built frontend files for Caddy to serve
      - zomboid-landing-dist:/app/dist:ro
      - ./.env:/app/.env:ro
      - ./changelog.json:/app/server/data/changelog.json:ro

    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      caddy:
        aliases:
          - zomboid-landing

networks:
  caddy:
    external: true

volumes:
  zomboid-landing-dist:
    external: true