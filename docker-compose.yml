version: '3.8'

services:
  app:
    image: ghcr.io/zsoltgombocz/zomboid-landing.cc:latest
    container_name: zomboid-landing
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3001:3001"

    volumes:
      - ./dist:/app/dist:ro

    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - zomboid-network

networks:
  zomboid-network:
    driver: bridge
