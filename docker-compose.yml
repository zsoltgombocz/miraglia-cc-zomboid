version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zomboid-landing
    restart: unless-stopped

    # Load environment variables from .env file
    env_file:
      - .env

    ports:
      - "3001:3001"

    volumes:
      # Persist database
      - ./data:/app/server/data

      # Expose built frontend files for Caddy to serve
      - ./dist:/app/dist:ro

    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - zomboid-network

networks:
  zomboid-network:
    driver: bridge

volumes:
  data:
    driver: local
